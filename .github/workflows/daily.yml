name: Daily Auto Content & Deploy

on:
  schedule:
    # 每天北京时间早上8点执行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate content
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate.py --provider deepseek --count 1

      - name: Build site
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          commit_message: 'Auto: daily content update [skip ci]'

      - name: Commit generated content
        run: |
          git config user.name "AutoContent Bot"
          git config user.email "bot@autocontent.local"
          git add content/
          git diff --staged --quiet || git commit -m "Auto: daily content generation"
          git push
